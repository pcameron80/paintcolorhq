        - generic [ref=e228]:
          - heading "How does cross-brand color matching work?" [level=3] [ref=e229]
          - paragraph [ref=e230]: We use the same color-matching formula that professional labs use (CIEDE2000) to find the closest equivalent across brands. Each match comes with an accuracy score — the lower the number, the closer the match. Most of ours score under 2.0, which means the difference is barely noticeable.
        - generic [ref=e231]:
          - heading "How much paint do I need?" [level=3] [ref=e232]
          - paragraph [ref=e233]: The Paint Calculator computes the exact number of gallons needed based on your room dimensions, number of coats, and door/window cutouts. One gallon of paint covers approximately 350–400 square feet.
        - generic [ref=e234]:
          - heading "What are paint color undertones?" [level=3] [ref=e235]
          - paragraph [ref=e236]: Every color has a hidden tint — warm (yellow/pink), cool (blue/gray), or neutral — that shows up under different lighting. All 25,000+ colors in our database are tagged so you can filter by undertone and avoid clashing with your existing trim, flooring, or cabinets.
      - paragraph [ref=e237]: Color data is based on manufacturer-published digital values (hex, RGB). Actual pigments, finishes, and lighting conditions vary. Always verify with a physical paint sample before purchasing.
