    - generic [ref=e34]:
      - heading "Reading the comparison" [level=2] [ref=e35]
      - paragraph [ref=e36]: Delta E (ΔE) measures perceptual color difference using the CIEDE2000 formula — the current industry standard. A ΔE under 1.0 is indistinguishable to the human eye. Most paint match tests pass at ΔE ≤ 2.0. Between 2 and 5 the difference is visible but subtle; above 5 the colors read as clearly different.
      - paragraph [ref=e37]: When you're verifying a custom match against the original can, anything under 2 is usually fine for touch-ups without repainting an adjacent wall. For side-by-side choices (trim vs. wall, accent vs. main), aim for ΔE of at least 3 so the contrast reads intentional rather than muddled.
      - paragraph [ref=e38]: LRV (Light Reflectance Value) shows how much light the paint reflects — 0 for pure black, 100 for pure white. Two colors within 5–10 LRV points will read similarly under the same lighting, even if their hex values differ. That matters when you're trying to keep a room feeling balanced across walls, trim, and ceiling.
      - paragraph [ref=e39]: "Common uses: checking whether two “white” paints (Chantilly Lace vs. Simply White) actually differ on the wall, confirming a competitor match before buying gallons, or verifying trim-to-wall contrast before committing."
